# ref: https://docs.github.com/ja/copilot/how-tos/use-copilot-agents/coding-agent/customize-the-agent-environment
name: 'Copilot Setup Steps'

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      COREPACK_ENABLE_AUTO_PIN: "0"

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          token: ${{ secrets.GH_PERSONAL_TOKEN }}
          ssh-key: ${{ secrets.PRIVATE_REPO_SSH_KEY }}

      # ENABLE_EXPERIMENTAL_COREPACK=1 in GitHub Actions runner overrides manage-package-manager-versions=false
      # and causes pnpm to add packageManagerDependencies to pnpm-lock.yaml.
      # Persist COREPACK_ENABLE_AUTO_PIN=0 so all subsequent processes (including Copilot agent) inherit it.
      - name: Persist COREPACK_ENABLE_AUTO_PIN=0
        shell: bash
        run: |
          echo "COREPACK_ENABLE_AUTO_PIN=0" >> "$GITHUB_ENV"
          echo "export COREPACK_ENABLE_AUTO_PIN=0" >> ~/.bashrc
          echo "export COREPACK_ENABLE_AUTO_PIN=0" >> ~/.profile

      - name: Setup project
        uses: ./.github/actions/setup-project
        with:
          database_url: ${{ secrets.DATABASE_URL }}
